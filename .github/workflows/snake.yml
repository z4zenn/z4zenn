name: generate animation

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: z4zenn
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0077ff88&color_dots=#ebedf0,#9be9ff,#64d4ff,#30b3ff,#0077ff
            dist/github-contribution-grid-snake-dark.svg?color_snake=#0077ff88&color_dots=#161b22,#002d4d,#004b80,#0069b3,#0077ff
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
